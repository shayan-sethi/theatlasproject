<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Article | Atlas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">Atlas</a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/articles">Articles</a>
      <a href="/infographics">Infographics</a>
      <a href="/about">About</a>
      <a href="/upload">Upload</a>
    </nav>
    <a class="subscribe-link" href="/#newsletter">Subscribe</a>
  </header>

  <main class="upload-page">
    <section class="upload-intro">
      <span class="eyebrow">Atlas backend</span>
      <h1>Upload an article.</h1>
      <p>Choose the continent desk, add the story details, and Atlas will save it locally to the site.</p>
    </section>

    <form class="article-form" method="post" action="/upload">
      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}

      <label>
        <span>Title</span>
        <input name="title" value="{{ form.get('title', '') }}" required>
      </label>

      <label>
        <span>Continent</span>
        <select name="continent" required>
          <option value="">Choose a continent</option>
          {% for slug, continent in continents.items() %}
          <option value="{{ slug }}" {% if form.get('continent') == slug %}selected{% endif %}>{{ continent.name }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        <span>Category</span>
        <input name="category" value="{{ form.get('category', '') }}" placeholder="Geopolitics, Climate, Markets...">
      </label>

      <label>
        <span>Summary</span>
        <textarea name="summary" rows="3" required>{{ form.get('summary', '') }}</textarea>
      </label>

      <label>
        <span>Article body</span>
        <textarea name="body" rows="10" required>{{ form.get('body', '') }}</textarea>
      </label>

      <button type="submit">Publish article</button>
    </form>
  </main>
</body>
</html>
